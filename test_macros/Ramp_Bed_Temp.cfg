[gcode_macro RAMP_BED_TEMP]
description: Inteligentna rampa 70→85→95→100→105→110 + komunikaty NA BIEŻĄCO
gcode:
    {% set TARGET = params.TARGET|default(110)|int %}
    {% set current = printer.heater_bed.temperature | float | round(0) | int %}

    RESPOND MSG="=== RAMP_BED_TEMP START ==="
    RESPOND MSG="Aktualna temperatura stołu: {current}°C"

    # Start od 70°C jeśli trzeba
    {% if current < 70 %}
        SET_HEATER_TEMPERATURE heater=heater_bed target=70
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=70
        G4 P10000
        RESPOND MSG="70°C → soak 10 s"
    {% endif %}

    {% if current < 85 and TARGET >= 85 %}
        SET_HEATER_TEMPERATURE heater=heater_bed target=85
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=85
        G4 P10000
        RESPOND MSG="85°C → soak 10 s"
    {% endif %}

    {% if current < 95 and TARGET >= 95 %}
        SET_HEATER_TEMPERATURE heater=heater_bed target=95
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=95
        G4 P10000
        RESPOND MSG="95°C → soak 10 s"
    {% endif %}

    {% if current < 100 and TARGET >= 100 %}
        SET_HEATER_TEMPERATURE heater=heater_bed target=100
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=100
        G4 P20000
        RESPOND MSG="100°C → soak 20 s"
    {% endif %}

    {% if current < 105 and TARGET >= 105 %}
        SET_HEATER_TEMPERATURE heater=heater_bed target=105
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=105
        G4 P20000
        RESPOND MSG="105°C → soak 20 s"
    {% endif %}

    {% if current < 110 and TARGET >= 110 %}
        SET_HEATER_TEMPERATURE heater=heater_bed target=110
        TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=110
        G4 P20000
        RESPOND MSG="110°C → soak 20 s"
    {% endif %}

    # Finalny soak
    G4 P90000
    RESPOND MSG="FINALNY SOAK 90 s na {TARGET}°C zakończony – stół gotowy!"
    RESPOND MSG="=== RAMP_BED_TEMP KONIEC ==="[gcode_macro RAMP_BED_TEMP]
