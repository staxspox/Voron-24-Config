#pin: PE11
#value: 1
#shutdown_value: 0

#####################################################################
#  Beacon Probe
#####################################################################
[beacon]
serial: /dev/serial/by-id/usb-Beacon_Beacon_RevH_25A490435157355957202020FF102C20-if00
x_offset: 0
y_offset: 23.8
mesh_main_direction: x
mesh_runs: 2
lift_speed: 50
backlash_comp: 0.00672 #0.00647 
accel_axes_map: x, y, z
speed: 30
#home_y_before_x: True 
#home_xy_position: 175, 175
#home_z_hop: 5
#home_z_hop_speed: 30
#home_xy_move_speed: 300
#home_method: contact
#home_method_when_homed: proximity
#home_autocalibrate: unhomed
contact_max_hotend_temperature: 150

#####################################################################
# Input Shaper
#####################################################################

[adxl345]
cs_pin: H36_combo:PB12
spi_software_sclk_pin: H36_combo:PB10
spi_software_mosi_pin: H36_combo:PB11
spi_software_miso_pin: H36_combo:PB2
axes_map: y, -z, -x

[resonance_tester]
accel_chip: beacon
probe_points: 175, 175, 5
accel_per_hz: 90
max_freq: 200
move_speed: 150
#hz_per_sec: 2
#sweeping_accel: 400
#sweeping_period: 0 #2

[input_shaper] #248.10.2025
shaper_type_x: mzv
shaper_freq_x: 69.4
#damping_ratio_x: 0.048
shaper_type_y: mzv
shaper_freq_y: 47.0
#damping_ratio_y: 0.035

#####################################################################
#   Homing and Gantry Adjustment Routines
#####################################################################
[bed_mesh]
algorithm: bicubic
speed: 600
probe_count: 35,35
horizontal_move_z: 5 #10  # Wzniesienie osi Z (mm) podczas próbkowania 2
mesh_min: 50,50
mesh_max: 310,310


# EXTRA SETTINGS
mesh_pps: 2,2
fade_start: 0.5
fade_end: 2 # 10
fade_target: 0
split_delta_z: 0.0125 #0.025 #
bicubic_tension: 0.1
zero_reference_position: 175, 175
adaptive_margin: 10 #5
move_check_distance: 3.0 #5.0
#------------------------------------------------------------------------------------------------------------------------------------------------------------------------
[gcode_macro CHOME]
description: Homes XYZ axis only if printer is in a non-homed state
gcode:
  {% if "xyz" not in printer.toolhead.homed_axes %}
    G28
    M400
  {% endif %}
#------------------------------------------------------------------------------------------------------------------------------------------------------------------------
[gcode_macro FRONT]
description: Moves the toolhead to the front
gcode:
  CHOME
  {% set x_center = printer.toolhead.axis_maximum.x|float / 2.0 %}
  {% set y_center = printer.toolhead.axis_maximum.y|float / 2.0 %}
  G90
  G1 X{x_center} Y50 F7800
#------------------------------------------------------------------------------------------------------------------------------------------------------------------------
[gcode_macro UNSAFE_RAISE_GANTRY]
description: Raise the gantry 5mm without homing
gcode:
  G90
  SET_KINEMATIC_POSITION Z=0
  G0 Z5 F300
#------------------------------------------------------------------------------------------------------------------------------------------------------------------------
[homing_override]
axes: xyz
gcode:
  {% set home_all = 'X' not in params and 'Y' not in params and 'Z' not in params %}

  {% if "z" not in printer.toolhead.homed_axes %}
    SET_KINEMATIC_POSITION Z=0
  {% endif %}

  _HOMING_OVERRIDE_SAFE_Z_MOVE
    
  {% if home_all or 'X' in params %}
    G28 X0
    G90
    G1 X5 F4500 #2200 ################# G1 X175 F1200
    G4 P2000
  {% endif %}
  
  {% if home_all or 'Y' in params %}
    G28 Y0
    G90
    G1 Y345 F4500 #2200
    G4 P2000
  {% endif %}
  
  {% if home_all or 'Z' in params %}
    G90
    G0 X175 Y175 F4500
    G28 Z
    G1 Z10
  {% endif %}
#------------------------------------------------------------------------------------------------------------------------------------------------------------------------
[gcode_macro _HOMING_OVERRIDE_SAFE_Z_MOVE]
gcode:
  {% if printer.toolhead.position.z < 10 %}
    G90
    G1 Z10
  {% endif %}

