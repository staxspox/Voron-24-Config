[gcode_macro CONFIGURE_FILAMENT_OFFSET]
gcode:
    {% set FILAMENT = params.FILAMENT_TYPE|default('PLA')|upper %}
    
    {% if FILAMENT == 'PLA' %}
        SET_GCODE_OFFSET Z_ADJUST=0.040
        {% set MSG = "PLA (Z 0.040)" %}
    
    {% elif FILAMENT in ['PET','PETG'] %}
        SET_GCODE_OFFSET Z_ADJUST=0.020
        {% set MSG = "PETG (Z 0.020)" %}
    
    {% elif FILAMENT == 'PETG-CF' %}
        SET_GCODE_OFFSET Z_ADJUST=0.020
        {% set MSG = "PETG-CF (Z 0.020)" %}

    {% elif FILAMENT == 'TPU' %}
        SET_GCODE_OFFSET Z_ADJUST=0.000
        {% set MSG = "TPU (Z 0.000)" %}
    
    {% elif FILAMENT in ['ASA','ABS'] %}      # Beacon model 'hot'
        SET_GCODE_OFFSET Z_ADJUST=0.000
        {% set MSG = "ABS/ASA (Z 0.000)" %}
        
    {% elif FILAMENT == 'ABS-CF' %}           # Beacon model 'hot'
        SET_GCODE_OFFSET Z_ADJUST=0.050       #0.400 dysza 0.4
        {% set MSG = "ABS-CF (Z 0.050)" %}
        
    {% elif FILAMENT == 'PC/ABS' %}           # Beacon model 'hot'
        SET_GCODE_OFFSET Z_ADJUST=0.250
        {% set MSG = "PC/ABS (Z 0.250)" %}
    
    {% else %}
        SET_GCODE_OFFSET Z_ADJUST=0.000
        {% set MSG = "Unknown Filament (Z 0.000)" %}
    {% endif %}

    # Display on printer screen
    M117 {MSG}
    
    # Send to console (OctoPrint/Mainsail/Fluidd)
    RESPOND TYPE=echo MSG="Filament set: {MSG}"
    
    # Optional execution confirmation
    RESPOND TYPE=echo MSG="CONFIGURE_FILAMENT_OFFSET completed"



